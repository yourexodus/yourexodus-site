<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Your Exodus</title>

    <link rel="stylesheet" href="login.css">

</head>


<body>


<header class="topbar">


    <div class="brand">

        <div class="logo">
            Your Exodus
        </div>


        <div class="tagline">
            Here your story does not have to end
        </div>

    </div>


</header>




<main class="login-container">


<section class="login-card">


<h1>
    Welcome Back
</h1>


<p>
    Continue your journey of healing,
    faith, and rebuilding.
</p>




<form id="loginForm">


<label for="username">
    Username
</label>


<input 
    type="text"
    id="username"
    name="username"
    placeholder="Enter your username"
    required
>



<label for="password">
    Password
</label>


<input 
    type="password"
    id="password"
    name="password"
    placeholder="Enter your password"
    required
>



<button type="submit">
    Login
</button>



</form>



<div id="message"></div>




<p class="register-link">

    Don't have an account?

    <a href="../register/index.html">
        Create one
    </a>

</p>



</section>


</main>



<script src="login.js"></script>


</body>

</html>
