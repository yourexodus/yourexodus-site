<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account | Your Exodus</title>

    <link rel="stylesheet" href="register.css">
</head>

<body>

<header class="topbar">

    <div class="brand">
        <div class="logo">
            Your Exodus
        </div>

        <div class="tagline">
            Here your story does not have to end
        </div>
    </div>

</header>


<main class="register-container">

    <section class="register-card">

        <h1>Create Your Account</h1>

        <p>
            Join a community built around healing, testimony,
            faith, and rebuilding.
        </p>


        <form id="registerForm">

            <label for="username">
                Username
            </label>

            <input 
                type="text"
                id="username"
                name="username"
                placeholder="Choose a username"
                required
            >


            <label for="email">
                Email
            </label>

            <input 
                type="email"
                id="email"
                name="email"
                placeholder="Enter your email"
                required
            >


            <label for="password">
                Password
            </label>

            <input 
                type="password"
                id="password"
                name="password"
                placeholder="Create a password"
                required
            >


            <button type="submit">
                Create Account
            </button>


        </form>


        <div id="message"></div>


        <p class="login-link">

            Already have an account?

            <a href="../login/index.html">
                Login here
            </a>

        </p>


    </section>


</main>


<script src="register.js"></script>

</body>
</html>
